<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧵</text></svg>"/>
<title>Payment Status – Libas Collection</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:wght@400;600&family=Lato:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Lato',sans-serif;background:linear-gradient(135deg,#FDFAF2 0%,#f5ead6 100%);color:#2D1458;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
.cinzel{font-family:'Cinzel',serif}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes checkPop{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.spinner{width:50px;height:50px;border:3px solid rgba(212,175,55,.2);border-top-color:#D4AF37;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 24px}
.card{background:#fff;border-radius:24px;padding:60px 40px;max-width:500px;width:92%;text-align:center;border:1px solid rgba(212,175,55,.25);box-shadow:0 20px 60px rgba(59,7,100,.12);animation:fadeUp 0.5s ease both}
.icon-success{font-size:80px;animation:checkPop .5s ease both;display:block;margin-bottom:4px}
.icon-fail{font-size:80px;display:block;margin-bottom:4px}
.icon-pending{font-size:80px;display:block;margin-bottom:4px;animation:pulse 2s ease infinite}
.btn-gold{padding:15px 44px;background:linear-gradient(135deg,#C9A020,#E8CC6A,#C9A020);background-size:200% auto;color:#180626;font-family:'Cinzel',serif;font-weight:700;letter-spacing:2px;border:none;border-radius:10px;cursor:pointer;transition:all .3s;margin-top:28px;font-size:13px;display:inline-block}
.btn-gold:hover{background-position:right center;transform:translateY(-2px);box-shadow:0 8px 24px rgba(212,175,55,.45)}
.btn-outline{padding:12px 32px;background:transparent;border:1px solid rgba(212,175,55,.5);color:#3B0764;font-family:'Cinzel',serif;font-weight:700;letter-spacing:1.5px;border-radius:10px;cursor:pointer;transition:all .3s;margin-top:12px;font-size:12px;display:inline-block}
.btn-outline:hover{background:#3B0764;color:#E8CC6A;border-color:#3B0764}
.order-box{background:linear-gradient(135deg,rgba(212,175,55,.08),rgba(59,7,100,.05));border:1px solid rgba(212,175,55,.3);border-radius:14px;padding:22px;margin:24px 0;text-align:left}
.status-badge{display:inline-block;padding:4px 14px;border-radius:20px;font-family:'Cinzel',serif;font-size:10px;font-weight:700;letter-spacing:1.5px}
.badge-success{background:rgba(16,185,129,.12);color:#059669;border:1px solid rgba(16,185,129,.3)}
.badge-pending{background:rgba(245,158,11,.12);color:#D97706;border:1px solid rgba(245,158,11,.3)}
.badge-failed{background:rgba(239,68,68,.12);color:#DC2626;border:1px solid rgba(239,68,68,.3)}
.progress-bar{width:100%;height:4px;background:rgba(212,175,55,.15);border-radius:2px;margin-top:16px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#C9A020,#E8CC6A);border-radius:2px;transition:width 2s linear}
.divider{height:1px;background:linear-gradient(90deg,transparent,rgba(212,175,55,.3),transparent);margin:16px 0}
</style>
</head>
<body>

<div class="card" id="statusCard">
  <div class="spinner"></div>
  <h2 class="cinzel" style="font-size:22px;color:#3B0764;margin-bottom:8px">Verifying Payment...</h2>
  <p style="color:#9CA3AF;font-size:14px">Please wait, do not close this page.</p>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <p style="font-size:11px;color:#C9A020;margin-top:8px;font-family:'Cinzel',serif;letter-spacing:1px" id="pollStatus">Connecting to server...</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/confetti.js"></script>
<script src="js/auth.js"></script>
<script>
const SUPABASE_FN_URL = 'https://hkdenuzxxrcvcgtbqgxq.supabase.co/functions/v1';
const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhrZGVudXp4eHJjdmNndGJxZ3hxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3NTM5MjIsImV4cCI6MjA4NzMyOTkyMn0.2GgEChu1H-1vyKorxjDm_p4VHP7YOuSpFMo_wF8f6vY';

async function verifyPayment() {
    const params  = new URLSearchParams(window.location.search);
    const orderId = params.get('order');
    const txnId   = params.get('txn');

    if (!orderId || !txnId) {
        showError('Invalid payment session. Please contact support.');
        return;
    }

    const progFill   = document.getElementById('progressFill');
    const pollStatus = document.getElementById('pollStatus');
    let resolved = false;

    function resolve(fn) {
        if (resolved) return;
        resolved = true;
        fn();
    }

    // 1. Subscribe to Realtime — catch webhook updates instantly if they arrive
    const sb2 = window.supabase.createClient(
        'https://hkdenuzxxrcvcgtbqgxq.supabase.co',
        ANON_KEY
    );
    sb2.channel('order-' + orderId)
      .on('postgres_changes', {
          event: 'UPDATE', schema: 'public', table: 'orders',
          filter: `id=eq.${orderId}`
      }, payload => {
          const status = (payload.new?.payment_status || '').toLowerCase();
          if (status === 'success' || status === 'paid') {
              if (progFill) progFill.style.width = '100%';
              resolve(() => showSuccess(payload.new));
          } else if (status === 'failed' || status === 'cancelled') {
              resolve(() => showFailure(orderId));
          }
      })
      .subscribe();

    // 2. Immediately call check-status edge function — this queries PhonePe directly
    //    and updates the DB. Retry up to 5× with 3s delay between attempts.
    let attempt = 0;
    const maxAttempts = 6;

    async function callCheckStatus() {
        attempt++;
        const pct = Math.min((attempt / maxAttempts) * 90, 90);
        if (progFill) progFill.style.width = pct + '%';
        if (pollStatus) pollStatus.textContent = `Checking with PhonePe... (${attempt}/${maxAttempts})`;

        try {
            const res = await fetch(`${SUPABASE_FN_URL}/check-status`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${ANON_KEY}`
                },
                body: JSON.stringify({ orderId, transactionId: txnId })
            });

            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            const status = (data.status || '').toLowerCase();

            if (status === 'success' || status === 'paid') {
                if (progFill) progFill.style.width = '100%';
                resolve(() => showSuccess(data.order));
            } else if (status === 'failed' || status === 'cancelled') {
                resolve(() => showFailure(orderId));
            } else if (attempt >= maxAttempts) {
                resolve(() => showPending(orderId));
            } else {
                // Still pending — retry after 5 seconds
                setTimeout(callCheckStatus, 5000);
            }
        } catch(e) {
            console.error('check-status error:', e);
            if (attempt >= maxAttempts) {
                resolve(() => showPending(orderId));
            } else {
                setTimeout(callCheckStatus, 5000);
            }
        }
    }

    // Start immediately
    callCheckStatus();
}

function showSuccess(order) {
    let itemsHTML = '';
    try {
        const items = Array.isArray(order.items) ? order.items : JSON.parse(order.items || '[]');
        itemsHTML = items.map(it => `
            <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(212,175,55,.1)">
                <div>
                    <p style="font-weight:600;font-size:14px;color:#2D1458">${it.name||'Item'}</p>
                    <p style="font-size:11px;color:#9CA3AF">${it.brand||''} · ${it.selectedSize||''} × ${it.qty||1}</p>
                </div>
                <span class="cinzel" style="font-size:14px;font-weight:700;color:#3B0764">₹${Number(it.price||0)*Number(it.qty||1)}</span>
            </div>`).join('');
    } catch(e) {}

    document.getElementById('statusCard').innerHTML = `
        <span class="icon-success">✅</span>
        <span class="status-badge badge-success" style="margin-bottom:16px">PAYMENT CONFIRMED</span>
        <h2 class="cinzel" style="font-size:28px;color:#3B0764;margin:16px 0 6px">Order Placed!</h2>
        <p style="font-family:'Cormorant Garamond',serif;font-size:18px;color:#2D1458">
            Thank you, <strong>${order.customer_name}</strong>!
        </p>
        <div class="order-box">
            <p class="cinzel" style="font-size:9px;color:#C9A020;letter-spacing:2.5px;margin-bottom:12px">ORDER ITEMS</p>
            ${itemsHTML || '<p style="color:#9CA3AF;font-size:13px">Item details not available.</p>'}
            <div class="divider"></div>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px">
                <span class="cinzel" style="font-size:11px;color:#9CA3AF">ORDER ID</span>
                <span class="cinzel" style="font-weight:700;color:#3B0764">#${order.display_order_id || order.id.substring(0,8).toUpperCase()}</span>
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">
                <span class="cinzel" style="font-size:11px;color:#9CA3AF">TOTAL PAID</span>
                <span class="cinzel" style="font-weight:700;font-size:18px;color:#3B0764">₹${order.total_amount}</span>
            </div>
        </div>
        <p style="font-size:13px;color:#9CA3AF;line-height:1.6">We will process your order and reach out to <strong>${order.customer_phone}</strong> soon.</p>
        <button class="btn-gold" onclick="window.location.href='index.html'">CONTINUE SHOPPING</button>
    `;
    
    // Send confirmation SMS — fire & forget (don't block UI)
    sendOrderSms(order);

    // Trigger confetti!
    setTimeout(() => {
        if(typeof triggerConfettiAndWelcome === 'function') {
            triggerConfettiAndWelcome(order.customer_name, "Payment Successful! Thank you for your order.");
        }
    }, 100);
}

// ── SMS via Fast2SMS (Supabase Edge Function) ──────────────────────
async function sendOrderSms(order) {
    try {
        const displayId = order.display_order_id || order.id?.substring(0,8).toUpperCase();
        await fetch(`${SUPABASE_FN_URL}/send-sms`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${ANON_KEY}`
            },
            body: JSON.stringify({
                phone:   order.customer_phone,
                name:    order.customer_name,
                orderId: displayId,
                amount:  order.total_amount
            })
        });
        // Result is logged server-side; we don't block or alert on failure
    } catch(e) {
        console.warn('SMS send failed (non-critical):', e);
    }
}

function showFailure(orderId) {
    document.getElementById('statusCard').innerHTML = `
        <span class="icon-fail">❌</span>
        <span class="status-badge badge-failed" style="margin-bottom:16px">PAYMENT FAILED</span>
        <h2 class="cinzel" style="font-size:26px;color:#DC2626;margin:16px 0 8px">Payment Not Completed</h2>
        <p style="color:#9CA3AF;margin-bottom:16px">Your payment was not completed. <strong>No money has been deducted.</strong></p>
        <div class="order-box">
            <div style="display:flex;justify-content:space-between">
                <span style="font-size:13px;color:#9CA3AF">Order Ref</span>
                <span class="cinzel" style="font-weight:700;color:#3B0764">#${orderId.substring(0,8).toUpperCase()}</span>
            </div>
        </div>
        <button class="btn-gold" onclick="window.location.href='cart.html'">TRY AGAIN</button>
        <br/>
        <button class="btn-outline" onclick="window.location.href='index.html'">GO HOME</button>
    `;
}

function showPending(orderId) {
    document.getElementById('statusCard').innerHTML = `
        <span class="icon-pending">⏳</span>
        <span class="status-badge badge-pending" style="margin-bottom:16px">PENDING CONFIRMATION</span>
        <h2 class="cinzel" style="font-size:24px;color:#C9A020;margin:16px 0 8px">Payment Pending</h2>
        <p style="color:#9CA3AF;margin-bottom:16px;line-height:1.6">Your payment is being processed by PhonePe. If money was deducted, your order is confirmed and we will contact you.</p>
        <div class="order-box">
            <div style="display:flex;justify-content:space-between">
                <span style="font-size:13px;color:#9CA3AF">Order ID</span>
                <span class="cinzel" style="font-weight:700;color:#3B0764">#${orderId.substring(0,8).toUpperCase()}</span>
            </div>
        </div>
        <button class="btn-gold" onclick="window.location.href='profile.html'">CHECK MY ORDERS</button>
        <br/>
        <button class="btn-outline" onclick="window.location.href='index.html'">GO HOME</button>
    `;
}

function showError(msg) {
    document.getElementById('statusCard').innerHTML = `
        <span class="icon-fail">⚠️</span>
        <h2 class="cinzel" style="font-size:22px;color:#3B0764;margin:20px 0 8px">Verification Issue</h2>
        <p style="color:#9CA3AF;margin-bottom:24px;line-height:1.6">${msg}</p>
        <button class="btn-gold" onclick="window.location.href='profile.html'">CHECK MY ORDERS</button>
        <br/>
        <button class="btn-outline" onclick="window.location.href='index.html'">GO HOME</button>
    `;
}

verifyPayment();
</script>

</body>
</html>
